<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <h1>Todo List</h1>

    <!-- Task Creation Form -->
    <form id="task-form">
        <input type="text" id="title" placeholder="Task title..." required>
        <textarea id="description" placeholder="Description..."></textarea>
        <select id="priority">
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
        </select>
        <input type="date" id="due-date">
        <input type="text" id="tags" placeholder="Tags (comma-separated)...">
        <button type="submit">Add Task</button>
    </form>

    <!-- Filters -->
    <div class="filters">
        <input type="text" id="search" placeholder="Search...">
        <select id="filter-priority">
            <option value="">All Priorities</option>
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
        </select>
        <input type="text" id="filter-tag" placeholder="Filter by tag...">
        <select id="sort-by">
            <option value="createdAt,desc">Newest First</option>
            <option value="createdAt,asc">Oldest First</option>
            <option value="updatedAt,desc">Recently Updated</option>
        </select>
    </div>

    <!-- Task List -->
    <ul id="task-list"></ul>

    <!-- Pagination -->
    <div class="pagination">
        <button id="prev-page" disabled>Previous</button>
        <span id="page-info">Page 1 of 1</span>
        <button id="next-page" disabled>Next</button>
    </div>
</div>

<!-- Edit Task Modal -->
<div id="edit-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>Edit Task</h2>
        <form id="edit-task-form">
            <input type="hidden" id="edit-task-id">
            <input type="text" id="edit-title" placeholder="Task title..." required>
            <textarea id="edit-description" placeholder="Description..."></textarea>
            <select id="edit-priority">
                <option value="LOW">Low</option>
                <option value="MEDIUM">Medium</option>
                <option value="HIGH">High</option>
            </select>
            <input type="date" id="edit-due-date">
            <input type="text" id="edit-tags" placeholder="Tags (comma-separated)...">
            <button type="submit">Update Task</button>
        </form>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
